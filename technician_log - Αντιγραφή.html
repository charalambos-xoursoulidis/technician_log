<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Ημερολόγιο Εργασιών</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f5f5f4;--bg3:#eceae6;--txt:#1a1a1a;--txt2:#6b6b6b;--brd:rgba(0,0,0,0.13);--brd2:rgba(0,0,0,0.24);--ok:#3B6D11;--ok-bg:#EAF3DE;--err:#A32D2D;--err-bg:#FCEBEB;--warn:#854F0B;--warn-bg:#FAEEDA;--info:#185FA5;--info-bg:#E6F1FB;--r:10px;--rl:14px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1c;--bg2:#272727;--bg3:#333;--txt:#f0f0f0;--txt2:#999;--brd:rgba(255,255,255,0.11);--brd2:rgba(255,255,255,0.22);--ok:#C0DD97;--ok-bg:#173404;--err:#F09595;--err-bg:#501313;--warn:#FAC775;--warn-bg:#412402;--info:#B5D4F4;--info-bg:#042C53}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt)}
.app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:14px 16px 10px;background:var(--bg);border-bottom:.5px solid var(--brd)}
.hdr h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.hdr p{font-size:12px;color:var(--txt2);margin-top:2px}
.nav{display:flex;background:var(--bg);border-bottom:.5px solid var(--brd);position:sticky;top:0;z-index:50}
.nb{flex:1;padding:10px 4px 8px;background:none;border:none;border-bottom:2px solid transparent;font-size:10px;font-weight:600;color:var(--txt2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nb i{font-size:20px}
.nb.act{color:var(--txt);border-bottom-color:var(--txt)}
.sec{display:none;padding:16px;flex:1}
.sec.act{display:block}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.fl input,.fl textarea,.fl select{width:100%;padding:11px 13px;border:.5px solid var(--brd2);border-radius:var(--r);font-size:16px;background:var(--bg);color:var(--txt);font-family:inherit;-webkit-appearance:none;outline:none;transition:border-color .15s}
.fl input:focus,.fl textarea:focus,.fl select:focus{border-color:var(--txt)}
.fl textarea{resize:vertical;min-height:80px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{width:100%;padding:14px;background:var(--txt);color:var(--bg);border:none;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-p:active{opacity:.8}
.btn-s{width:100%;padding:12px;background:var(--bg2);color:var(--txt);border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.btn-o{width:100%;padding:12px;background:var(--bg);border:.5px solid var(--brd2);border-radius:var(--r);font-size:14px;color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-o:active{background:var(--bg2)}
.toast{display:none;margin-top:12px;padding:12px 14px;border-radius:var(--r);font-size:14px;text-align:center;font-weight:500}
.toast.ok{background:var(--ok-bg);color:var(--ok)}
.toast.err{background:var(--err-bg);color:var(--err)}
.toast.info{background:var(--info-bg);color:var(--info)}
.toast.warn{background:var(--warn-bg);color:var(--warn)}
.tech-bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:var(--r);margin-bottom:14px}
.av{width:38px;height:38px;border-radius:50%;background:var(--bg);border:.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--txt);flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#639922}.dot-pend{background:#BA7517}.dot-off{background:#888}
.dg{margin-bottom:20px}
.dh{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;padding:6px 0;border-bottom:.5px solid var(--brd);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.dt{font-size:12px;color:var(--txt);background:var(--bg2);padding:2px 9px;border-radius:99px;font-weight:600}
.ec{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px}
.et{font-size:15px;font-weight:500;margin-bottom:5px;line-height:1.4}
.em{display:flex;gap:8px;font-size:12px;color:var(--txt2);flex-wrap:wrap;align-items:center;margin-bottom:8px}
.bdg{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--bg2);color:var(--txt2)}
.entry-btns{display:flex;gap:8px}
.edit-btn{flex:1;padding:7px;background:var(--bg2);border:none;border-radius:var(--r);font-size:12px;color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500}
.del-btn{padding:7px 12px;background:none;border:.5px solid var(--err-bg);border-radius:var(--r);font-size:12px;color:var(--err);cursor:pointer;display:flex;align-items:center;gap:5px}
.empty{text-align:center;padding:48px 20px;color:var(--txt2);font-size:14px}
.empty i{font-size:44px;display:block;margin-bottom:12px;opacity:.25}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--bg2);border-radius:var(--r);padding:14px}
.sl{font-size:11px;color:var(--txt2);margin-bottom:4px}
.sv{font-size:22px;font-weight:600}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bl{width:30px;font-size:11px;color:var(--txt2);text-align:right}
.bt{flex:1;height:7px;background:var(--bg2);border-radius:99px;overflow:hidden}
.bf{height:100%;border-radius:99px;background:var(--txt)}
.bv{width:40px;font-size:11px;color:var(--txt2)}
.stitle{font-size:13px;font-weight:600;margin-bottom:8px}
.sep{height:.5px;background:var(--brd);margin:16px 0}
.cfg-title{font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid var(--brd)}
.info-box{background:var(--info-bg);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--info);line-height:1.5}
.danger-btn{width:100%;padding:12px;background:var(--bg);border:.5px solid var(--err);border-radius:var(--r);font-size:14px;color:var(--err);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
/* Modal επεξεργασίας */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--bg2);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--txt2)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1><i class="ti ti-tool"></i> Ημερολόγιο Εργασιών</h1>
    <p id="hdr-date"></p>
  </div>
  <nav class="nav">
    <button class="nb act" onclick="showTab('add')"><i class="ti ti-plus"></i>Νέα</button>
    <button class="nb" onclick="showTab('log')"><i class="ti ti-list"></i>Αρχείο</button>
    <button class="nb" onclick="showTab('stats')"><i class="ti ti-chart-bar"></i>Στατιστικά</button>
    <button class="nb" onclick="showTab('cfg')"><i class="ti ti-settings"></i>Ρυθμίσεις</button>
  </nav>

  <!-- ΝΕΑ ΕΓΓΡΑΦΗ -->
  <div id="tab-add" class="sec act">
    <div class="tech-bar">
      <div class="av" id="av">?</div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600" id="dn">—</div>
        <div style="font-size:12px;color:var(--txt2)">Τεχνικός</div>
      </div>
      <div class="sync-dot dot-off" id="sync-dot"></div>
      <span style="font-size:11px;color:var(--txt2)" id="sync-lbl">Εκτός σύνδεσης</span>
    </div>
    <div class="fl"><label>Ημερομηνία</label><input type="date" id="e-date"></div>
    <div class="fl"><label>Περιγραφή εργασίας</label><textarea id="e-task" placeholder="Τι δουλειά έκανες..."></textarea></div>
    <div class="fl"><label>Κατηγορία</label>
      <select id="e-cat">
        <option>🔧 Εγκατάσταση</option><option>🔩 Συντήρηση</option><option>🛠️ Επισκευή</option>
        <option>🔍 Έλεγχος</option><option>🚗 Μεταφορά</option><option>📋 Άλλο</option>
      </select>
    </div>
    <div class="fl"><label>Διάρκεια εργασίας</label>
      <div class="g2">
        <input type="number" id="e-h" placeholder="Ώρες" min="0" max="24" step="1" inputmode="numeric">
        <input type="number" id="e-m" placeholder="Λεπτά" min="0" max="59" step="15" inputmode="numeric">
      </div>
    </div>
    <div class="fl"><label>Τοποθεσία / Πελάτης (προαιρετικό)</label>
      <input type="text" id="e-loc" placeholder="π.χ. Μαρούσι – Εταιρεία ΑΒΓ">
    </div>
    <button class="btn-p" onclick="saveEntry()"><i class="ti ti-device-floppy"></i> Αποθήκευση εργασίας</button>
    <div class="toast" id="add-toast"></div>
  </div>

  <!-- ΑΡΧΕΙΟ -->
  <div id="tab-log" class="sec">
    <button class="btn-o" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i> Εξαγωγή σε Excel (.xlsx)</button>
    <button class="btn-o" onclick="syncAll()"><i class="ti ti-cloud-upload"></i> Συγχρονισμός στο Supabase</button>
    <div class="toast" id="log-toast"></div>
    <div id="log-container" style="margin-top:4px"></div>
  </div>

  <!-- ΣΤΑΤΙΣΤΙΚΑ -->
  <div id="tab-stats" class="sec">
    <div class="sgrid" id="stats-grid"></div>
    <div class="stitle">Τελευταίες 7 ημέρες</div>
    <div id="week-bars"></div>
    <div class="sep"></div>
    <div class="stitle">Ανά κατηγορία</div>
    <div id="cat-bars"></div>
  </div>

  <!-- ΡΥΘΜΙΣΕΙΣ -->
  <div id="tab-cfg" class="sec">
    <div style="margin-bottom:20px">
      <div class="cfg-title"><i class="ti ti-user"></i> Στοιχεία τεχνικού</div>
      <div class="fl"><label>Ονοματεπώνυμο</label>
        <input type="text" id="cfg-name" placeholder="π.χ. Νίκος Παπαδόπουλος" oninput="saveCfg()">
      </div>
    </div>
    <div style="margin-bottom:20px">
      <div class="cfg-title"><i class="ti ti-database"></i> Σύνδεση Supabase</div>
      <div class="info-box">
        <strong>Πού τα βρίσκω;</strong><br>
        Supabase → Settings → API Keys<br>
        → καρτέλα <strong>Legacy anon</strong> → αντέγραψε το <strong>anon key</strong> (eyJ...)
      </div>
      <div class="fl"><label>Project URL</label>
        <input type="url" id="cfg-url" placeholder="https://xxxx.supabase.co" oninput="saveCfg()">
      </div>
      <div class="fl"><label>Anon Key</label>
        <input type="text" id="cfg-key" placeholder="eyJhbGci..." oninput="saveCfg()">
      </div>
      <div class="fl"><label>Όνομα πίνακα</label>
        <input type="text" id="cfg-table" placeholder="work_logs" oninput="saveCfg()">
      </div>
      <button class="btn-o" onclick="testConn()"><i class="ti ti-plug"></i> Δοκιμή σύνδεσης</button>
      <div class="toast" id="cfg-toast"></div>
    </div>
    <div>
      <div class="cfg-title"><i class="ti ti-alert-triangle"></i> Εκκαθάριση</div>
      <button class="danger-btn" onclick="clearAll()"><i class="ti ti-trash"></i> Διαγραφή όλων των τοπικών δεδομένων</button>
    </div>
  </div>
</div>

<!-- MODAL ΕΠΕΞΕΡΓΑΣΙΑΣ -->
<div class="modal-overlay" id="edit-modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">
      <span><i class="ti ti-edit"></i> Επεξεργασία εγγραφής</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="fl"><label>Ημερομηνία</label><input type="date" id="m-date"></div>
    <div class="fl"><label>Περιγραφή εργασίας</label><textarea id="m-task" style="min-height:80px"></textarea></div>
    <div class="fl"><label>Κατηγορία</label>
      <select id="m-cat">
        <option>🔧 Εγκατάσταση</option><option>🔩 Συντήρηση</option><option>🛠️ Επισκευή</option>
        <option>🔍 Έλεγχος</option><option>🚗 Μεταφορά</option><option>📋 Άλλο</option>
      </select>
    </div>
    <div class="fl"><label>Διάρκεια εργασίας</label>
      <div class="g2">
        <input type="number" id="m-h" placeholder="Ώρες" min="0" max="24" inputmode="numeric">
        <input type="number" id="m-m" placeholder="Λεπτά" min="0" max="59" inputmode="numeric">
      </div>
    </div>
    <div class="fl"><label>Τοποθεσία / Πελάτης</label><input type="text" id="m-loc"></div>
    <button class="btn-p" onclick="saveEdit()"><i class="ti ti-check"></i> Αποθήκευση αλλαγών</button>
    <button class="btn-s" onclick="closeModal()">Ακύρωση</button>
  </div>
</div>

<script>
const LS='twl_v3',CS='twl_cfg_v3';
let editingId=null;

function cfg(){try{return JSON.parse(localStorage.getItem(CS)||'{}')}catch{return{}}}
function saveCfgObj(o){localStorage.setItem(CS,JSON.stringify(o))}
function saveCfg(){
  const o={name:gv('cfg-name'),url:gv('cfg-url'),key:gv('cfg-key'),table:gv('cfg-table')||'work_logs'};
  saveCfgObj(o);
  const n=o.name.trim();
  document.getElementById('dn').textContent=n||'—';
  document.getElementById('av').textContent=n?initials(n):'?';
  updateSyncStatus();
}
function loadCfgUI(){
  const o=cfg();
  sv('cfg-name',o.name||'');sv('cfg-url',o.url||'');sv('cfg-key',o.key||'');sv('cfg-table',o.table||'work_logs');
  const n=(o.name||'').trim();
  document.getElementById('dn').textContent=n||'—';
  document.getElementById('av').textContent=n?initials(n):'?';
}
function gv(id){return document.getElementById(id).value}
function sv(id,val){document.getElementById(id).value=val}
function initials(n){const p=n.trim().split(' ').filter(Boolean);return p.length===1?p[0][0].toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase()}
function load(){try{return JSON.parse(localStorage.getItem(LS)||'[]')}catch{return[]}}
function saveData(d){localStorage.setItem(LS,JSON.stringify(d))}
function toMins(h,m){return(parseInt(h)||0)*60+(parseInt(m)||0)}
function fmtT(m){const h=Math.floor(m/60),mm=m%60;return h&&mm?h+'ώ '+mm+'λ.':h?h+'ώ.':mm+'λ.'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(id,msg,type,dur=3000){
  const el=document.getElementById(id);
  el.textContent=msg;el.className='toast '+type;el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',dur);
}
function updateSyncStatus(){
  const o=cfg();const ok=o.url&&o.key;
  const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-lbl');
  const pend=load().filter(e=>!e.synced).length;
  if(!ok){dot.className='sync-dot dot-off';lbl.textContent='Supabase: μη ρυθμ.';return}
  if(pend>0){dot.className='sync-dot dot-pend';lbl.textContent=pend+' εκκρεμ.'}
  else{dot.className='sync-dot dot-ok';lbl.textContent='Συγχρον.'}
}
function saveEntry(){
  const task=gv('e-task').trim(),date=gv('e-date'),mins=toMins(gv('e-h'),gv('e-m'));
  if(!task){toast('add-toast','⚠ Συμπλήρωσε την περιγραφή.','warn');return}
  if(!date){toast('add-toast','⚠ Επίλεξε ημερομηνία.','warn');return}
  if(!mins){toast('add-toast','⚠ Βάλε τη διάρκεια.','warn');return}
  const{name}=cfg();
  const entry={id:Date.now(),date,task,cat:gv('e-cat'),mins,loc:gv('e-loc').trim(),tech:name||'',synced:false,created_at:new Date().toISOString()};
  const d=load();d.push(entry);saveData(d);
  sv('e-task','');sv('e-h','');sv('e-m','');sv('e-loc','');
  toast('add-toast','✓ Αποθηκεύτηκε!','ok');
  updateSyncStatus();autoSync(entry);
}

/* ΕΠΕΞΕΡΓΑΣΙΑ */
function openEdit(id){
  const d=load();const e=d.find(x=>x.id===id);if(!e)return;
  editingId=id;
  sv('m-date',e.date);sv('m-task',e.task);sv('m-loc',e.loc||'');
  sv('m-h',Math.floor(e.mins/60));sv('m-m',e.mins%60);
  document.getElementById('m-cat').value=e.cat;
  document.getElementById('edit-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('edit-modal').classList.remove('open');
  document.body.style.overflow='';
  editingId=null;
}
function closeModalOutside(ev){if(ev.target===document.getElementById('edit-modal'))closeModal()}
function saveEdit(){
  if(!editingId)return;
  const task=gv('m-task').trim(),date=gv('m-date'),mins=toMins(gv('m-h'),gv('m-m'));
  if(!task||!date||!mins)return;
  const d=load();const i=d.findIndex(x=>x.id===editingId);
  if(i<0)return;
  d[i]={...d[i],date,task,cat:gv('m-cat'),mins,loc:gv('m-loc').trim(),synced:false,updated_at:new Date().toISOString()};
  saveData(d);closeModal();renderLog();updateSyncStatus();
  // Sync updated entry
  autoSyncUpdate(d[i]);
}

async function autoSync(entry){
  const o=cfg();if(!o.url||!o.key)return;
  try{
    const r=await fetch(o.url+'/rest/v1/'+(o.table||'work_logs'),{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':o.key,'Authorization':'Bearer '+o.key,'Prefer':'return=representation'},
      body:JSON.stringify({date:entry.date,task:entry.task,category:entry.cat,duration_mins:entry.mins,location:entry.loc,technician:entry.tech,created_at:entry.created_at})
    });
    if(r.ok){
      const res=await r.json();
      const d=load();const i=d.findIndex(e=>e.id===entry.id);
      if(i>=0){d[i].synced=true;d[i].supabase_id=res[0]?.id;saveData(d)}
      updateSyncStatus();
    }
  }catch(e){}
}
async function autoSyncUpdate(entry){
  const o=cfg();if(!o.url||!o.key||!entry.supabase_id)return;
  try{
    const r=await fetch(o.url+'/rest/v1/'+(o.table||'work_logs')+'?id=eq.'+entry.supabase_id,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':o.key,'Authorization':'Bearer '+o.key,'Prefer':'return=minimal'},
      body:JSON.stringify({date:entry.date,task:entry.task,category:entry.cat,duration_mins:entry.mins,location:entry.loc})
    });
    if(r.ok){
      const d=load();const i=d.findIndex(e=>e.id===entry.id);
      if(i>=0){d[i].synced=true;saveData(d)}
      updateSyncStatus();renderLog();
    }
  }catch(e){}
}
async function syncAll(){
  const o=cfg();
  if(!o.url||!o.key){toast('log-toast','⚠ Ρύθμισε πρώτα το Supabase.','warn');return}
  const d=load();const pending=d.filter(e=>!e.synced);
  if(!pending.length){toast('log-toast','Δεν υπάρχουν εκκρεμείς εγγραφές.','info');return}
  toast('log-toast','⏳ Αποστολή '+pending.length+' εγγραφών...','info',10000);
  let ok=0,fail=0;
  for(const entry of pending){
    try{
      const r=await fetch(o.url+'/rest/v1/'+(o.table||'work_logs'),{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':o.key,'Authorization':'Bearer '+o.key,'Prefer':'return=representation'},
        body:JSON.stringify({date:entry.date,task:entry.task,category:entry.cat,duration_mins:entry.mins,location:entry.loc,technician:entry.tech,created_at:entry.created_at})
      });
      if(r.ok){
        const res=await r.json();
        const i=d.findIndex(e=>e.id===entry.id);
        if(i>=0){d[i].synced=true;d[i].supabase_id=res[0]?.id}ok++;
      }else fail++;
    }catch{fail++}
  }
  saveData(d);updateSyncStatus();renderLog();
  if(fail===0)toast('log-toast','✓ '+ok+' εγγραφές στάλθηκαν!','ok');
  else toast('log-toast','✓ '+ok+' OK  ✗ '+fail+' απέτυχαν','err',5000);
}
async function testConn(){
  const o=cfg();
  if(!o.url||!o.key){toast('cfg-toast','⚠ Συμπλήρωσε URL και Key.','warn');return}
  toast('cfg-toast','⏳ Δοκιμή...','info',8000);
  try{
    const r=await fetch(o.url+'/rest/v1/'+(o.table||'work_logs')+'?limit=1',{
      headers:{'apikey':o.key,'Authorization':'Bearer '+o.key}
    });
    if(r.ok)toast('cfg-toast','✓ Σύνδεση επιτυχής!','ok',4000);
    else{const t=await r.text();toast('cfg-toast','✗ '+r.status+': '+t.slice(0,80),'err',6000)}
  }catch(e){toast('cfg-toast','✗ Σφάλμα: '+e.message,'err',6000)}
}
function exportExcel(){
  const d=load();
  if(!d.length){toast('log-toast','⚠ Δεν υπάρχουν εγγραφές.','warn');return}
  const rows=d.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>({'Ημερομηνία':e.date,'Τεχνικός':e.tech||'','Εργασία':e.task,'Κατηγορία':e.cat,'Ώρες':Math.floor(e.mins/60),'Λεπτά':e.mins%60,'Σύνολο ώρες':parseFloat((e.mins/60).toFixed(2)),'Τοποθεσία':e.loc||'','Συγχρ.':e.synced?'Ναι':'Όχι'}));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Εργασίες');
  XLSX.writeFile(wb,'εργασιες_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('log-toast','✓ Το Excel κατέβηκε!','ok');
}
function deleteEntry(id){
  if(!confirm('Διαγραφή αυτής της εγγραφής;'))return;
  saveData(load().filter(e=>e.id!==id));renderLog();updateSyncStatus();
}
function renderLog(){
  const d=load();const c=document.getElementById('log-container');
  if(!d.length){c.innerHTML='<div class="empty"><i class="ti ti-clipboard-list"></i>Καμία εγγραφή ακόμα.</div>';return}
  const gr={};
  d.sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{if(!gr[e.date])gr[e.date]=[];gr[e.date].push(e)});
  let h='';
  Object.entries(gr).forEach(([date,entries])=>{
    const tot=entries.reduce((s,e)=>s+e.mins,0);
    const dstr=new Date(date+'T00:00:00').toLocaleDateString('el-GR',{weekday:'long',day:'numeric',month:'long'});
    h+=`<div class="dg"><div class="dh"><span>${dstr}</span><span class="dt"><i class="ti ti-clock" style="font-size:11px"></i> ${fmtT(tot)}</span></div>`;
    entries.forEach(e=>{
      const sd=e.synced?'<span class="sync-dot dot-ok" style="display:inline-block"></span> Συγχρον.':'<span class="sync-dot dot-pend" style="display:inline-block"></span> Εκκρεμεί';
      h+=`<div class="ec">
        <div class="et">${esc(e.task)}</div>
        <div class="em">
          <span><i class="ti ti-clock" style="font-size:13px"></i> ${fmtT(e.mins)}</span>
          <span class="bdg">${esc(e.cat)}</span>
          ${e.loc?`<span><i class="ti ti-map-pin" style="font-size:12px"></i> ${esc(e.loc)}</span>`:''}
          <span style="margin-left:auto;font-size:11px">${sd}</span>
        </div>
        <div class="entry-btns">
          <button class="edit-btn" onclick="openEdit(${e.id})"><i class="ti ti-edit"></i> Επεξεργασία</button>
          <button class="del-btn" onclick="deleteEntry(${e.id})"><i class="ti ti-trash"></i> Διαγραφή</button>
        </div>
      </div>`;
    });
    h+='</div>';
  });
  c.innerHTML=h;
}
function renderStats(){
  const d=load();
  const tot=d.reduce((s,e)=>s+e.mins,0);
  const days=[...new Set(d.map(e=>e.date))].length;
  const synced=d.filter(e=>e.synced).length;
  document.getElementById('stats-grid').innerHTML=`
    <div class="sc"><div class="sl">Σύνολο ωρών</div><div class="sv">${Math.floor(tot/60)}<span style="font-size:14px">ώ ${tot%60}λ.</span></div></div>
    <div class="sc"><div class="sl">Εγγραφές</div><div class="sv">${d.length}</div></div>
    <div class="sc"><div class="sl">Ημέρες</div><div class="sv">${days}</div></div>
    <div class="sc"><div class="sl">Συγχρ./Σύνολο</div><div class="sv">${synced}/${d.length}</div></div>`;
  const last7=[];
  for(let i=6;i>=0;i--){const dd=new Date();dd.setDate(dd.getDate()-i);const k=dd.toISOString().slice(0,10);last7.push({lbl:dd.toLocaleDateString('el-GR',{weekday:'short'}),mins:d.filter(e=>e.date===k).reduce((s,e)=>s+e.mins,0)})}
  const mx=Math.max(...last7.map(x=>x.mins),1);
  document.getElementById('week-bars').innerHTML=last7.map(x=>`<div class="bar-row"><div class="bl">${x.lbl}</div><div class="bt"><div class="bf" style="width:${Math.round(x.mins/mx*100)}%"></div></div><div class="bv">${x.mins?fmtT(x.mins):'–'}</div></div>`).join('');
  const cats={};d.forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.mins});
  const mxc=Math.max(...Object.values(cats),1);
  document.getElementById('cat-bars').innerHTML=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,m])=>`<div class="bar-row"><div class="bl" style="width:80px;text-align:left;white-space:nowrap">${c}</div><div class="bt"><div class="bf" style="width:${Math.round(m/mxc*100)}%"></div></div><div class="bv">${fmtT(m)}</div></div>`).join('')||'<div style="font-size:13px;color:var(--txt2)">Δεν υπάρχουν δεδομένα.</div>';
}
function showTab(t){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('act'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  document.getElementById('tab-'+t).classList.add('act');
  document.querySelectorAll('.nb')[{add:0,log:1,stats:2,cfg:3}[t]].classList.add('act');
  if(t==='log')renderLog();
  if(t==='stats')renderStats();
}
function clearAll(){
  if(!confirm('ΠΡΟΣΟΧΗ: Θα διαγραφούν ΟΛΑ τα τοπικά δεδομένα;'))return;
  localStorage.removeItem(LS);toast('cfg-toast','✓ Διαγράφηκαν.','ok');updateSyncStatus();
}
(function init(){
  document.getElementById('e-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('el-GR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  loadCfgUI();updateSyncStatus();
})();
</script>
